name: Gemini News Bot

on:
  schedule:
    - cron: '0 0 * * *' # 매일 아침 9시 실행
  workflow_dispatch:

jobs:
  update_news:
    runs-on: ubuntu-latest
    # 💡 로봇에게 Node.js 24를 쓰라고 미리 알려주는 마법의 주문이에요
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
     

    steps:
      # 최신 버전(@v5, @v6 등)으로 도구들을 업데이트했어요!
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install feedparser google-genai pandas requests
          
      - name: Run News Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python news_bot.py
        
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add README.md
          # 변경사항이 있을 때만 저장하도록 했어요
          git commit -m "Update: AI News $(date)" || echo "No changes to commit"
          git push
